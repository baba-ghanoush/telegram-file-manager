name: Chapter PR Automation

on:
  push:
    branches:
      - 'feature/chapter-*'
      - 'research/verification-*'
      - 'process/lock-*'
  workflow_dispatch:
    inputs:
      chapter:
        description: 'Chapter number'
        required: true
        type: string
      action:
        description: 'Action (draft, verify, lock)'
        required: true
        type: choice
        options:
          - draft
          - verify
          - lock
      agent:
        description: 'Primary agent responsible'
        required: true
        type: string

jobs:
  create-chapter-pr:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Determine PR type
      id: pr-type
      run: |
        # Extract chapter number from branch name
        BRANCH_NAME="${GITHUB_REF#refs/heads/}"
        echo "Branch: $BRANCH_NAME"
        
        if [[ "$BRANCH_NAME" == feature/chapter-* ]]; then
          CHAPTER_NUM="${BRANCH_NAME#feature/chapter-}"
          PR_TYPE="draft"
          PR_TITLE="Chapter $CHAPTER_NUM - Draft"
          PR_BODY_PREFIX="## Chapter $CHAPTER_NUM Draft"
        elif [[ "$BRANCH_NAME" == research/verification-* ]]; then
          CHAPTER_NUM="${BRANCH_NAME#research/verification-}"
          PR_TYPE="verify"
          PR_TITLE="Chapter $CHAPTER_NUM - Research Verification"
          PR_BODY_PREFIX="## Chapter $CHAPTER_NUM Research Verification"
        elif [[ "$BRANCH_NAME" == process/lock-* ]]; then
          CHAPTER_NUM="${BRANCH_NAME#process/lock-}"
          PR_TYPE="lock"
          PR_TITLE="Chapter $CHAPTER_NUM - Lock Process"
          PR_BODY_PREFIX="## Chapter $CHAPTER_NUM Lock Process"
        else
          CHAPTER_NUM="${{ github.event.inputs.chapter }}"
          PR_TYPE="${{ github.event.inputs.action }}"
          PR_TITLE="Chapter $CHAPTER_NUM - ${{ github.event.inputs.action | capitalize }}"
          PR_BODY_PREFIX="## Chapter $CHAPTER_NUM ${{ github.event.inputs.action | capitalize }}"
        fi
        
        echo "chapter_num=$CHAPTER_NUM" >> $GITHUB_OUTPUT
        echo "pr_type=$PR_TYPE" >> $GITHUB_OUTPUT
        echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
        echo "pr_body_prefix=$PR_BODY_PREFIX" >> $GITHUB_OUTPUT
    
    - name: Analyze changes
      id: analyze
      run: |
        # Get commit history for this branch
        git log --oneline -10
        
        # Count file changes
        FILE_COUNT=$(git diff --name-only origin/main...HEAD | wc -l)
        echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
        
        # Get primary file types
        FILE_TYPES=$(git diff --name-only origin/main...HEAD | grep -o '\.[^.]*$' | sort | uniq -c | sort -rn | head -5)
        echo "file_types<<EOF" >> $GITHUB_OUTPUT
        echo "$FILE_TYPES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref_name }}
        base: main
        title: "${{ steps.pr-type.outputs.pr_title }}"
        body: |
          ${{ steps.pr-type.outputs.pr_body_prefix }}
          
          **Agent:** ${{ github.event.inputs.agent || 'Automated' }}
          **Type:** ${{ steps.pr-type.outputs.pr_type }}
          **Chapter:** ${{ steps.pr-type.outputs.chapter_num }}
          **Files Changed:** ${{ steps.analyze.outputs.file_count }}
          
          ### Change Summary
          ```bash
          ${{ steps.analyze.outputs.file_types }}
          ```
          
          ### Commit History
          ```bash
          $(git log --oneline -10 origin/main...HEAD)
          ```
          
          ### Quality Checks
          - [ ] Chapter structure follows packet
          - [ ] Emotional engine implemented
          - [ ] No-go list respected
          - [ ] Timeline accuracy verified
          - [ ] Character consistency maintained
          
          ### Review Process
          1. **@Automator** reviews for canon accuracy
          2. **@Metatron** verifies GitHub protocol compliance
          3. **Agent lead** confirms completion
          4. **Merge to main** after all approvals
          
          ### GitHub Protocol Compliance
          - ✅ Agent signaled completion
          - ✅ Branch follows naming convention
          - ✅ PR includes detailed change summary
          - ✅ Quality checklist included
          - ✅ Review process documented
          
          ---
          
          *This PR was automatically generated by the Chapter PR Automation workflow.*
        labels: "chapter-${{ steps.pr-type.outputs.chapter_num }}, ${{ steps.pr-type.outputs.pr_type }}, automated-pr"
        reviewers: "baba-ghanoush"
        assignees: "baba-ghanoush"
        delete-branch: true
    
    - name: Update chapter status
      run: |
        # Update chapter status tracking
        STATUS_FILE="github/chapter-status.json"
        if [ ! -f "$STATUS_FILE" ]; then
          echo '{"chapters": {}}' > "$STATUS_FILE"
        fi
        
        CHAPTER_NUM="${{ steps.pr-type.outputs.chapter_num }}"
        PR_TYPE="${{ steps.pr-type.outputs.pr_type }}"
        PR_URL="${{ steps.create-pr.outputs.pull-request-url }}"
        
        jq --arg chapter "$CHAPTER_NUM" \
           --arg type "$PR_TYPE" \
           --arg url "$PR_URL" \
           --arg timestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
           '.chapters[$chapter] = (.chapters[$chapter] // {}) | 
            .chapters[$chapter].last_action = $type |
            .chapters[$chapter].last_action_timestamp = $timestamp |
            .chapters[$chapter].pr_url = $url |
            .chapters[$chapter].github_run_id = "$GITHUB_RUN_ID"' \
           "$STATUS_FILE" > tmp.json && mv tmp.json "$STATUS_FILE"
        
        # Commit status update
        git add "$STATUS_FILE"
        git commit -m "[STATUS] Chapter $CHAPTER_NUM - $PR_TYPE PR created"
        git push origin ${{ github.ref_name }}
        
        echo "✅ Chapter $CHAPTER_NUM status updated: $PR_TYPE"