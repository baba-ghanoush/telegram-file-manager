name: Test Telegram File Manager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    
    - name: Test script syntax
      run: |
        python -m py_compile scripts/file-processor.py
    
    - name: Run basic tests
      run: |
        python scripts/file-processor.py --help
        echo "Basic functionality check passed"